<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4BA6A"/>
      <stop offset="50%" style="stop-color:#C9A94E"/>
      <stop offset="100%" style="stop-color:#A88B3A"/>
    </linearGradient>
    <pattern id="noise2" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="#111" opacity="0.3"/>
      <circle cx="20" cy="30" r="0.5" fill="#333" opacity="0.5"/>
      <circle cx="80" cy="10" r="0.5" fill="#333" opacity="0.4"/>
      <circle cx="150" cy="60" r="0.5" fill="#333" opacity="0.3"/>
      <circle cx="40" cy="90" r="0.5" fill="#333" opacity="0.5"/>
      <circle cx="120" cy="140" r="0.5" fill="#333" opacity="0.4"/>
      <circle cx="180" cy="170" r="0.5" fill="#333" opacity="0.3"/>
      <circle cx="60" cy="180" r="0.5" fill="#333" opacity="0.5"/>
    </pattern>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1500" height="500" fill="url(#bg2)"/>
  <rect width="1500" height="500" fill="url(#noise2)" opacity="0.5"/>
  <!-- Top and bottom gold lines -->
  <rect x="0" y="0" width="1500" height="3" fill="url(#g2)" opacity="0.6"/>
  <rect x="0" y="497" width="1500" height="3" fill="url(#g2)" opacity="0.6"/>
  <!-- Decorative dumbbell left -->
  <rect x="80" y="235" width="20" height="30" rx="2" fill="url(#g2)" opacity="0.2"/>
  <rect x="60" y="240" width="20" height="20" rx="2" fill="url(#g2)" opacity="0.15"/>
  <line x1="100" y1="250" x2="250" y2="250" stroke="url(#g2)" stroke-width="3" opacity="0.15"/>
  <!-- JP Mark centered -->
  <rect x="670" y="80" width="160" height="160" fill="none" stroke="url(#g2)" stroke-width="2.5"/>
  <text x="750" y="183" font-family="Georgia, serif" font-size="80" font-weight="700" fill="url(#g2)" text-anchor="middle" letter-spacing="5" filter="url(#glow2)">JP</text>
  <!-- Name -->
  <text x="750" y="300" font-family="Georgia, serif" font-size="52" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="12">JOHNSON</text>
  <text x="750" y="358" font-family="Georgia, serif" font-size="52" font-weight="600" fill="url(#g2)" text-anchor="middle" letter-spacing="12">PERFORMANCE</text>
  <!-- Divider -->
  <line x1="550" y1="390" x2="950" y2="390" stroke="url(#g2)" stroke-width="1" opacity="0.3"/>
  <circle cx="750" cy="390" r="4" fill="url(#g2)" opacity="0.5"/>
  <!-- Tagline -->
  <text x="750" y="430" font-family="Helvetica, sans-serif" font-size="15" fill="#999999" text-anchor="middle" letter-spacing="10">PRIVATE TRAINING STUDIO</text>
  <!-- Decorative dumbbell right -->
  <line x1="1250" y1="250" x2="1400" y2="250" stroke="url(#g2)" stroke-width="3" opacity="0.15"/>
  <rect x="1400" y="235" width="20" height="30" rx="2" fill="url(#g2)" opacity="0.2"/>
  <rect x="1420" y="240" width="20" height="20" rx="2" fill="url(#g2)" opacity="0.15"/>
</svg>