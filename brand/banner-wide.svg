  <path d="M40,460 L40,425" stroke="url(#gW)" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M1460,460 L1425,460" stroke="url(#gW)" stroke-width="1.5" fill="none" opacity="0.35"/>
  <path d="M1460,460 L1460,425" stroke="url(#gW)" stroke-width="1.5" fill="none" opacity="0.35"/>
