<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4BA6A"/>
      <stop offset="50%" style="stop-color:#C9A94E"/>
      <stop offset="100%" style="stop-color:#A88B3A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#C9A94E" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0A0A0A"/>
  <!-- Outer frame -->
  <rect x="25" y="25" width="150" height="150" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <!-- Inner frame -->
  <rect x="32" y="32" width="136" height="136" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner accents -->
  <line x1="25" y1="25" x2="45" y2="25" stroke="url(#gold)" stroke-width="3"/>
  <line x1="25" y1="25" x2="25" y2="45" stroke="url(#gold)" stroke-width="3"/>
  <line x1="175" y1="25" x2="155" y2="25" stroke="url(#gold)" stroke-width="3"/>
  <line x1="175" y1="25" x2="175" y2="45" stroke="url(#gold)" stroke-width="3"/>
  <line x1="25" y1="175" x2="45" y2="175" stroke="url(#gold)" stroke-width="3"/>
  <line x1="25" y1="175" x2="25" y2="155" stroke="url(#gold)" stroke-width="3"/>
  <line x1="175" y1="175" x2="155" y2="175" stroke="url(#gold)" stroke-width="3"/>
  <line x1="175" y1="175" x2="175" y2="155" stroke="url(#gold)" stroke-width="3"/>
  <!-- JP Letters -->
  <text x="100" y="118" font-family="Georgia, 'Cormorant Garamond', serif" font-size="72" font-weight="700" fill="url(#gold)" text-anchor="middle" letter-spacing="4" filter="url(#shadow)">JP</text>
  <!-- Decorative barbell line under text -->
  <line x1="55" y1="138" x2="145" y2="138" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <circle cx="55" cy="138" r="3" fill="url(#gold)" opacity="0.5"/>
  <circle cx="145" cy="138" r="3" fill="url(#gold)" opacity="0.5"/>
</svg>