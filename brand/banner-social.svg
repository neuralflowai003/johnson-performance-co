<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050505"/>
      <stop offset="50%" style="stop-color:#0D0D0D"/>
      <stop offset="100%" style="stop-color:#050505"/>
    </linearGradient>
    <linearGradient id="gB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D48B"/>
      <stop offset="30%" style="stop-color:#C9A94E"/>
      <stop offset="60%" style="stop-color:#B8973F"/>
      <stop offset="100%" style="stop-color:#8A6E2F"/>
    </linearGradient>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="50" stroke="#151515" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="50" y2="0" stroke="#151515" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bgG)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>
  <!-- Top/bottom gold lines -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#gB)" opacity="0.4"/>
  <rect x="0" y="628" width="1200" height="2" fill="url(#gB)" opacity="0.4"/>
  <!-- Corner brackets -->
  <path d="M60,60 L100,60" stroke="url(#gB)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M60,60 L60,100" stroke="url(#gB)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M1140,60 L1100,60" stroke="url(#gB)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M1140,60 L1140,100" stroke="url(#gB)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M60,570 L100,570" stroke="url(#gB)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M60,570 L60,530" stroke="url(#gB)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M1140,570 L1100,570" stroke="url(#gB)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M1140,570 L1140,530" stroke="url(#gB)" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Barbell top decoration -->
  <rect x="380" y="148" width="22" height="14" rx="1" fill="url(#gB)" opacity="0.12"/>
  <rect x="360" y="150" width="20" height="10" rx="1" fill="url(#gB)" opacity="0.08"/>
  <line x1="402" y1="155" x2="798" y2="155" stroke="url(#gB)" stroke-width="2.5" opacity="0.15"/>
  <rect x="798" y="148" width="22" height="14" rx="1" fill="url(#gB)" opacity="0.12"/>
  <rect x="820" y="150" width="20" height="10" rx="1" fill="url(#gB)" opacity="0.08"/>
  <!-- JP Mark -->
  <rect x="520" y="180" width="160" height="160" fill="none" stroke="url(#gB)" stroke-width="2.5"/>
  <rect x="528" y="188" width="144" height="144" fill="none" stroke="url(#gB)" stroke-width="0.5" opacity="0.2"/>
  <path d="M520,180 L548,180" stroke="url(#gB)" stroke-width="4" fill="none"/>
  <path d="M520,180 L520,208" stroke="url(#gB)" stroke-width="4" fill="none"/>
  <path d="M680,180 L652,180" stroke="url(#gB)" stroke-width="4" fill="none"/>
  <path d="M680,180 L680,208" stroke="url(#gB)" stroke-width="4" fill="none"/>
  <path d="M520,340 L548,340" stroke="url(#gB)" stroke-width="4" fill="none"/>
  <path d="M520,340 L520,312" stroke="url(#gB)" stroke-width="4" fill="none"/>
  <path d="M680,340 L652,340" stroke="url(#gB)" stroke-width="4" fill="none"/>
  <path d="M680,340 L680,312" stroke="url(#gB)" stroke-width="4" fill="none"/>
  <polygon points="600,170 606,176 600,182 594,176" fill="url(#gB)" opacity="0.5"/>
  <text x="600" y="282" font-family="Georgia, serif" font-size="82" font-weight="700" fill="url(#gB)" text-anchor="middle" letter-spacing="6" filter="url(#glowB)">JP</text>
  <!-- Name -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="46" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="10">JOHNSON</text>
  <text x="600" y="450" font-family="Georgia, serif" font-size="46" font-weight="600" fill="url(#gB)" text-anchor="middle" letter-spacing="10">PERFORMANCE</text>
  <!-- Divider with diamond -->
  <line x1="400" y1="480" x2="570" y2="480" stroke="url(#gB)" stroke-width="0.5" opacity="0.35"/>
  <polygon points="600,476 604,480 600,484 596,480" fill="url(#gB)" opacity="0.4"/>
  <line x1="630" y1="480" x2="800" y2="480" stroke="url(#gB)" stroke-width="0.5" opacity="0.35"/>
  <!-- Tagline -->
  <text x="600" y="510" font-family="Helvetica, sans-serif" font-size="12" fill="#777777" text-anchor="middle" letter-spacing="9">PRIVATE TRAINING STUDIO</text>
</svg>