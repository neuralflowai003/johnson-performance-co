<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4BA6A"/>
      <stop offset="50%" style="stop-color:#C9A94E"/>
      <stop offset="100%" style="stop-color:#A88B3A"/>
    </linearGradient>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#1A1A1A" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#1A1A1A" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#gridPattern)" opacity="0.4"/>
  <!-- Gold accent lines -->
  <line x1="80" y1="0" x2="80" y2="630" stroke="url(#gd)" stroke-width="1" opacity="0.15"/>
  <line x1="1120" y1="0" x2="1120" y2="630" stroke="url(#gd)" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="url(#gd)" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="550" x2="1200" y2="550" stroke="url(#gd)" stroke-width="0.5" opacity="0.1"/>
  <!-- Decorative barbell -->
  <line x1="350" y1="200" x2="850" y2="200" stroke="url(#gd)" stroke-width="2" opacity="0.2"/>
  <rect x="350" y="190" width="30" height="20" rx="2" fill="url(#gd)" opacity="0.15"/>
  <rect x="820" y="190" width="30" height="20" rx="2" fill="url(#gd)" opacity="0.15"/>
  <!-- JP Mark -->
  <rect x="520" y="220" width="160" height="160" fill="none" stroke="url(#gd)" stroke-width="2.5"/>
  <rect x="528" y="228" width="144" height="144" fill="none" stroke="url(#gd)" stroke-width="0.5" opacity="0.3"/>
  <text x="600" y="322" font-family="Georgia, serif" font-size="80" font-weight="700" fill="url(#gd)" text-anchor="middle" letter-spacing="5" filter="url(#glow)">JP</text>
  <!-- Company Name -->
  <text x="600" y="430" font-family="Georgia, serif" font-size="42" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">JOHNSON</text>
  <text x="600" y="478" font-family="Georgia, serif" font-size="42" font-weight="600" fill="url(#gd)" text-anchor="middle" letter-spacing="8">PERFORMANCE</text>
  <!-- Tagline -->
  <line x1="420" y1="510" x2="560" y2="510" stroke="url(#gd)" stroke-width="0.5" opacity="0.4"/>
  <text x="600" y="538" font-family="Helvetica, sans-serif" font-size="13" fill="#999999" text-anchor="middle" letter-spacing="8">PRIVATE TRAINING STUDIO</text>
  <line x1="640" y1="510" x2="780" y2="510" stroke="url(#gd)" stroke-width="0.5" opacity="0.4"/>
  <!-- Corner brackets -->
  <polyline points="100,100 100,80 120,80" fill="none" stroke="url(#gd)" stroke-width="2" opacity="0.5"/>
  <polyline points="1100,100 1100,80 1080,80" fill="none" stroke="url(#gd)" stroke-width="2" opacity="0.5"/>
  <polyline points="100,530 100,550 120,550" fill="none" stroke="url(#gd)" stroke-width="2" opacity="0.5"/>
  <polyline points="1100,530 1100,550 1080,550" fill="none" stroke="url(#gd)" stroke-width="2" opacity="0.5"/>
</svg>