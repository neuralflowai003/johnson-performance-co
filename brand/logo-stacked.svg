<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="gs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4BA6A"/>
      <stop offset="50%" style="stop-color:#C9A94E"/>
      <stop offset="100%" style="stop-color:#A88B3A"/>
    </linearGradient>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="500" fill="#0A0A0A"/>
  <!-- JP Mark -->
  <rect x="120" y="60" width="160" height="160" fill="none" stroke="url(#gs)" stroke-width="2.5"/>
  <rect x="128" y="68" width="144" height="144" fill="none" stroke="url(#gs)" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner accents -->
  <line x1="120" y1="60" x2="140" y2="60" stroke="url(#gs)" stroke-width="3.5"/>
  <line x1="120" y1="60" x2="120" y2="80" stroke="url(#gs)" stroke-width="3.5"/>
  <line x1="280" y1="60" x2="260" y2="60" stroke="url(#gs)" stroke-width="3.5"/>
  <line x1="280" y1="60" x2="280" y2="80" stroke="url(#gs)" stroke-width="3.5"/>
  <line x1="120" y1="220" x2="140" y2="220" stroke="url(#gs)" stroke-width="3.5"/>
  <line x1="120" y1="220" x2="120" y2="200" stroke="url(#gs)" stroke-width="3.5"/>
  <line x1="280" y1="220" x2="260" y2="220" stroke="url(#gs)" stroke-width="3.5"/>
  <line x1="280" y1="220" x2="280" y2="200" stroke="url(#gs)" stroke-width="3.5"/>
  <text x="200" y="162" font-family="Georgia, serif" font-size="80" font-weight="700" fill="url(#gs)" text-anchor="middle" letter-spacing="5" filter="url(#glowS)">JP</text>
  <!-- Barbell divider -->
  <circle cx="140" cy="270" r="5" fill="url(#gs)" opacity="0.3"/>
  <rect x="125" y="262" width="10" height="16" rx="1" fill="url(#gs)" opacity="0.2"/>
  <line x1="145" y1="270" x2="255" y2="270" stroke="url(#gs)" stroke-width="2" opacity="0.3"/>
  <circle cx="260" cy="270" r="5" fill="url(#gs)" opacity="0.3"/>
  <rect x="265" y="262" width="10" height="16" rx="1" fill="url(#gs)" opacity="0.2"/>
  <!-- Text -->
  <text x="200" y="330" font-family="Georgia, serif" font-size="36" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="6">JOHNSON</text>
  <text x="200" y="375" font-family="Georgia, serif" font-size="36" font-weight="600" fill="url(#gs)" text-anchor="middle" letter-spacing="6">PERFORMANCE</text>
  <text x="200" y="408" font-family="Georgia, serif" font-size="22" font-weight="500" fill="url(#gs)" text-anchor="middle" letter-spacing="3" opacity="0.7">CO.</text>
  <!-- Tagline -->
  <line x1="120" y1="440" x2="280" y2="440" stroke="url(#gs)" stroke-width="0.5" opacity="0.3"/>
  <text x="200" y="468" font-family="Helvetica, sans-serif" font-size="11" fill="#999999" text-anchor="middle" letter-spacing="8">PRIVATE TRAINING STUDIO</text>
</svg>