<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520">
  <defs>
    <linearGradient id="gS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D48B"/>
      <stop offset="30%" style="stop-color:#C9A94E"/>
      <stop offset="60%" style="stop-color:#B8973F"/>
      <stop offset="100%" style="stop-color:#8A6E2F"/>
    </linearGradient>
    <linearGradient id="gS2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D48B"/>
      <stop offset="100%" style="stop-color:#8A6E2F"/>
    </linearGradient>
    <filter id="glowS">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="520" fill="#050505"/>
  <!-- Outer frame -->
  <rect x="30" y="30" width="340" height="460" fill="none" stroke="url(#gS)" stroke-width="0.5" opacity="0.1"/>
  <!-- JP Mark -->
  <rect x="120" y="50" width="160" height="160" fill="none" stroke="url(#gS)" stroke-width="2.5"/>
  <rect x="128" y="58" width="144" height="144" fill="none" stroke="url(#gS2)" stroke-width="0.5" opacity="0.2"/>
  <!-- Corner accents -->
  <path d="M120,50 L145,50" stroke="url(#gS)" stroke-width="4" fill="none"/>
  <path d="M120,50 L120,75" stroke="url(#gS)" stroke-width="4" fill="none"/>
  <path d="M280,50 L255,50" stroke="url(#gS)" stroke-width="4" fill="none"/>
  <path d="M280,50 L280,75" stroke="url(#gS)" stroke-width="4" fill="none"/>
  <path d="M120,210 L145,210" stroke="url(#gS)" stroke-width="4" fill="none"/>
  <path d="M120,210 L120,185" stroke="url(#gS)" stroke-width="4" fill="none"/>
  <path d="M280,210 L255,210" stroke="url(#gS)" stroke-width="4" fill="none"/>
  <path d="M280,210 L280,185" stroke="url(#gS)" stroke-width="4" fill="none"/>
  <!-- Diamond top -->
  <polygon points="200,40 206,46 200,52 194,46" fill="url(#gS)" opacity="0.5"/>
  <!-- JP -->
  <text x="200" y="155" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700" fill="url(#gS)" text-anchor="middle" letter-spacing="6" filter="url(#glowS)">JP</text>
  <!-- Weight plate divider -->
  <circle cx="155" cy="260" r="10" fill="none" stroke="url(#gS)" stroke-width="1" opacity="0.25"/>
  <circle cx="155" cy="260" r="6" fill="none" stroke="url(#gS)" stroke-width="0.5" opacity="0.15"/>
  <line x1="165" y1="260" x2="235" y2="260" stroke="url(#gS)" stroke-width="2" opacity="0.3"/>
  <circle cx="245" cy="260" r="10" fill="none" stroke="url(#gS)" stroke-width="1" opacity="0.25"/>
  <circle cx="245" cy="260" r="6" fill="none" stroke="url(#gS)" stroke-width="0.5" opacity="0.15"/>
  <!-- Text -->
  <text x="200" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">JOHNSON</text>
  <text x="200" y="365" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="600" fill="url(#gS)" text-anchor="middle" letter-spacing="8">PERFORMANCE</text>
  <text x="200" y="400" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="500" fill="url(#gS)" text-anchor="middle" letter-spacing="4" opacity="0.6">CO.</text>
  <!-- Bottom separator -->
  <line x1="130" y1="430" x2="180" y2="430" stroke="url(#gS)" stroke-width="0.5" opacity="0.3"/>
  <polygon points="200,426 204,430 200,434 196,430" fill="url(#gS)" opacity="0.3"/>
  <line x1="220" y1="430" x2="270" y2="430" stroke="url(#gS)" stroke-width="0.5" opacity="0.3"/>
  <!-- Tagline -->
  <text x="200" y="460" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="10" fill="#777777" text-anchor="middle" letter-spacing="9">PRIVATE TRAINING STUDIO</text>
</svg>