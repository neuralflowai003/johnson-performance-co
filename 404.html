<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Johnson Performance Co.</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            color: #E8E8E3;
            font-family: 'Barlow Condensed', 'Arial Narrow', sans-serif;
            text-align: center;
            padding: 24px;
        }
        .wrap { max-width: 640px; }
        .num {
            font-size: clamp(7rem, 24vw, 13rem);
            font-weight: 800;
            line-height: 0.9;
            color: transparent;
            -webkit-text-stroke: 2px rgba(201, 169, 78, 0.55);
            letter-spacing: 0.02em;
        }
        h1 {
            font-size: clamp(1.8rem, 5.5vw, 2.8rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            margin: 26px 0 10px;
        }
        h1 em {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-weight: 500;
            text-transform: none;
            background: linear-gradient(105deg, #F0DFAC, #DFC178 45%, #B89340);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-family: Georgia, serif;
            font-style: italic;
            color: #9a958a;
            font-size: 1.05rem;
            margin-bottom: 38px;
        }
        a {
            display: inline-block;
            padding: 16px 42px;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            text-decoration: none;
            color: #050505;
            background: linear-gradient(135deg, #E8D48B, #C9A94E);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        a:hover { transform: translateY(-3px); box-shadow: 0 12px 36px rgba(201,169,78,0.35); }
        .rule {
            width: 60px; height: 2px; margin: 30px auto;
            background: linear-gradient(90deg, #E8D48B, #8A6E2F);
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="num">404</div>
        <h1>This page <em>skipped leg day.</em></h1>
        <div class="rule"></div>
        <p>It's not where it's supposed to be. Let's get you back to the gym.</p>
        <a href="/">Back to the Studio</a>
    </div>
</body>
</html>
